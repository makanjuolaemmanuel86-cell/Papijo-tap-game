
<!DOCTYPE html>
<html>
<head>
<title>Papijo Tap Game</title>

<style>
body{
text-align:center;
font-family:Arial;
background:#111;
color:white;
}

button{
font-size:25px;
padding:15px 30px;
margin:10px;
background:gold;
border:none;
border-radius:10px;
cursor:pointer;
}

#score{
font-size:40px;
margin:20px;
}
</style>

</head>

<body>

<h1>🪙 Papijo Tap Coin</h1>

<div id="score">Coins: 0</div>

<button onclick="tap()">TAP</button>

<h3>Invite Friends</h3>

<input id="ref" value="https://t.me/papijoXBot" style="width:80%">
<br>
<button onclick="copy()">Copy Invite Link</button>

<script>

let coins = 0;

function tap(){
coins++;
document.getElementById("score").innerText = "Coins: " + coins;
}

function copy(){
let link = document.getElementById("ref");
link.select();
document.execCommand("copy");
alert("Invite link copied!");
}

</script>

</body>
</html>
